<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue Router Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #42d392;
      --blue:    #647eff;
      --bg:      #0f0f1a;
      --surface: #1a1a2e;
      --card:    #16213e;
      --border:  #2a2a4a;
      --text:    #e8e8f0;
      --muted:   #8888aa;
      --correct: #22c55e;
      --wrong:   #ef4444;
      --radius:  14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(100,126,255,.25), rgba(66,211,146,.15));
      border: 1px solid rgba(100,126,255,.4);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 18px;
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #647eff, #42d392);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    header p {
      color: var(--muted);
      margin-top: 10px;
      font-size: .95rem;
    }

    /* ── Progress bar ───────────────────────────── */
    .progress-wrap {
      width: 100%;
      max-width: 760px;
      margin-bottom: 28px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 999px;
      transition: width .4s ease;
    }

    /* ── Score strip ────────────────────────────── */
    .score-strip {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
    }

    .score-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 20px;
      font-size: .85rem;
      font-weight: 600;
    }

    .score-pill.correct { color: var(--correct); border-color: rgba(34,197,94,.35); }
    .score-pill.wrong   { color: var(--wrong);   border-color: rgba(239,68, 68,.35); }
    .score-pill.left    { color: var(--muted); }

    /* ── Question card ──────────────────────────── */
    .quiz-wrap {
      width: 100%;
      max-width: 760px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 36px;
      margin-bottom: 20px;
      animation: slideIn .35s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-meta {
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--blue);
      margin-bottom: 12px;
    }

    .q-text {
      font-size: 1.08rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .q-text code, .option code {
      background: rgba(100,126,255,.15);
      color: var(--green);
      border-radius: 5px;
      padding: 1px 7px;
      font-family: 'Courier New', monospace;
      font-size: .92em;
    }

    /* Code block */
    pre {
      background: #0d0d1a;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 16px 20px;
      overflow-x: auto;
      font-family: 'Courier New', monospace;
      font-size: .82rem;
      color: #c9d1d9;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    pre .kw  { color: #ff7b72; }
    pre .fn  { color: #d2a8ff; }
    pre .str { color: #a5d6ff; }
    pre .cm  { color: #8b949e; }
    pre .tag { color: #7ee787; }
    pre .attr{ color: #79c0ff; }

    /* ── Options ────────────────────────────────── */
    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      cursor: pointer;
      font-size: .95rem;
      line-height: 1.5;
      transition: border-color .2s, background .2s, transform .12s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .option:hover:not(.locked) {
      border-color: var(--blue);
      background: rgba(100,126,255,.08);
      transform: translateX(4px);
    }

    .option .letter {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      background: var(--border);
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      transition: background .2s, color .2s;
    }

    .option.selected   { border-color: var(--blue);    background: rgba(100,126,255,.12); }
    .option.selected .letter { background: var(--blue);  color: #fff; }
    .option.correct    { border-color: var(--correct);  background: rgba(34,197,94,.1);  }
    .option.correct .letter  { background: var(--correct); color: #fff; }
    .option.wrong      { border-color: var(--wrong);    background: rgba(239,68,68,.1);  }
    .option.wrong .letter    { background: var(--wrong);   color: #fff; }
    .option.reveal     { border-color: var(--correct);  background: rgba(34,197,94,.06); }
    .option.reveal .letter   { background: var(--correct); color: #fff; }
    .option.locked     { cursor: default; }

    /* Explanation */
    .explanation {
      display: none;
      margin-top: 20px;
      background: rgba(100,126,255,.08);
      border-left: 3px solid var(--blue);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .explanation.show { display: block; }
    .explanation strong { color: var(--text); }

    /* ── Buttons ────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn {
      padding: 11px 28px;
      border-radius: 9px;
      border: none;
      font-family: inherit;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .12s;
    }

    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: #fff;
    }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn:disabled { opacity: .35; cursor: default; }

    /* ── Results screen ─────────────────────────── */
    #results {
      display: none;
      text-align: center;
      padding: 48px 36px;
    }

    #results .trophy {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    #results h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #results .final-score {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 20px 0;
    }

    .grade-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 24px 0 32px;
      flex-wrap: wrap;
    }

    .grade-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .grade-num {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .grade-label {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .review-list {
      text-align: left;
      margin-top: 32px;
    }

    .review-list h3 {
      font-size: 1.1rem;
      margin-bottom: 16px;
      color: var(--muted);
    }

    .review-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 12px;
      font-size: .88rem;
      line-height: 1.6;
    }

    .review-item .ri-q { color: var(--text); margin-bottom: 6px; font-weight: 500; }
    .review-item .ri-a { color: var(--correct); }
    .review-item .ri-x { color: var(--wrong); }

    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <div class="badge">📍 CSCI 232 · Vue Router</div>
  <h1>Vue Router Quiz</h1>
  <p>20 questions · Based on the official guide &amp; demo14</p>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="q-counter">Question 1 of 20</span>
    <span id="q-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<div class="score-strip">
  <div class="score-pill correct">✓ <span id="sc-correct">0</span> Correct</div>
  <div class="score-pill wrong">✗ <span id="sc-wrong">0</span> Wrong</div>
  <div class="score-pill left"><span id="sc-left">20</span> Remaining</div>
</div>

<div class="quiz-wrap">
  <div class="card" id="q-card">
    <!-- Rendered by JS -->
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-prev" onclick="navigate(-1)">← Back</button>
    <button class="btn btn-primary"   id="btn-next" onclick="navigateNext()">Next →</button>
  </div>

  <div class="card" id="results">
    <!-- Results screen -->
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   QUIZ DATA  –  20 questions
═══════════════════════════════════════════════════ */
const questions = [
  // ── 1
  {
    text: `What is the primary purpose of <code>vue-router</code> in a Vue application?`,
    options: [
      `Managing global state across components`,
      `Enabling client-side navigation between views without full page reloads`,
      `Handling HTTP requests to a backend server`,
      `Compiling Vue single-file components`
    ],
    answer: 1,
    explanation: `<strong>vue-router</strong> is the official router for Vue.js. It maps URL paths to components and enables SPA (single-page application) navigation — switching views without a full browser reload.`
  },
  // ── 2
  {
    text: `In <code>demo14</code>, what is the <strong>first</strong> route registered in <code>router/index.js</code>?`,
    code: `const routes = [\n  { path: '/', component: LoginView },\n  { path: '/about', component: AboutView },\n  { path: '/user/:uid', component: UserView },\n  ...\n]`,
    options: [
      `AboutView at <code>/about</code>`,
      `UserView at <code>/user/:uid</code>`,
      `LoginView at <code>/</code>`,
      `NotFoundView at <code>/:pathMatch(.*)*</code>`
    ],
    answer: 2,
    explanation: `The first entry in the <code>routes</code> array maps the root path <code>/</code> to <code>LoginView</code>, making the login screen the default landing page.`
  },
  // ── 3
  {
    text: `Which function is used to <strong>create a router instance</strong> in Vue Router 4?`,
    options: [
      `new VueRouter({ ... })`,
      `createRouter({ ... })`,
      `Vue.use(Router)`,
      `buildRouter({ ... })`
    ],
    answer: 1,
    explanation: `Vue Router 4 uses the composable-friendly <code>createRouter()</code> function. The old <code>new VueRouter()</code> syntax was Vue Router 3 (for Vue 2).`
  },
  // ── 4
  {
    text: `How is the router <strong>registered</strong> with the Vue application in <code>main.js</code>?`,
    code: `import { createApp } from 'vue'\nimport App from './App.vue'\nimport router from './router'\n\nconst app = createApp(App)\napp.use(router)\napp.mount('#app')`,
    options: [
      `By passing it directly to <code>createApp(App, router)</code>`,
      `By calling <code>app.router(router)</code>`,
      `By calling <code>app.use(router)</code> before <code>app.mount()</code>`,
      `By importing it inside every component that needs routing`
    ],
    answer: 2,
    explanation: `The router is registered as a <strong>plugin</strong> via <code>app.use(router)</code>. This must happen before <code>app.mount()</code>. The plugin globally registers <code>&lt;RouterView&gt;</code>, <code>&lt;RouterLink&gt;</code>, and injects <code>$router</code> / <code>$route</code>.`
  },
  // ── 5
  {
    text: `What does the <code>&lt;RouterView /&gt;</code> component do in <code>App.vue</code>?`,
    options: [
      `It creates a clickable navigation link`,
      `It renders the component matched by the current URL path`,
      `It stores the history of visited routes`,
      `It defines which routes are available`
    ],
    answer: 1,
    explanation: `<code>&lt;RouterView /&gt;</code> is the <strong>outlet</strong> — it renders whichever component is matched by the current route. Without it, nothing is displayed even if a route matches.`
  },
  // ── 6
  {
    text: `What does <code>&lt;RouterLink to="/about"&gt;About&lt;/RouterLink&gt;</code> render in the browser?`,
    options: [
      `A plain text label "About"`,
      `A <code>&lt;button&gt;</code> element`,
      `An <code>&lt;a&gt;</code> tag that navigates without reloading the page`,
      `A <code>&lt;div&gt;</code> with a click handler`
    ],
    answer: 2,
    explanation: `<code>&lt;RouterLink&gt;</code> renders as an <code>&lt;a&gt;</code> element, but intercepts clicks so Vue Router handles navigation client-side — the full page never reloads.`
  },
  // ── 7
  {
    text: `In <code>demo14</code>'s <code>App.vue</code>, how is the <strong>Home</strong> link written?`,
    code: `<nav>\n  <RouterLink to="/">Home</RouterLink> &nbsp;\n  <RouterLink to="/about">About</RouterLink>\n</nav>`,
    options: [
      `<code>&lt;a href="/"&gt;Home&lt;/a&gt;</code>`,
      `<code>&lt;RouterLink to="/"&gt;Home&lt;/RouterLink&gt;</code>`,
      `<code>&lt;router-link href="/"&gt;Home&lt;/router-link&gt;</code>`,
      `<code>&lt;Link url="/"&gt;Home&lt;/Link&gt;</code>`
    ],
    answer: 1,
    explanation: `The demo uses <code>&lt;RouterLink to="/"&gt;Home&lt;/RouterLink&gt;</code>. PascalCase (<code>RouterLink</code>) and kebab-case (<code>router-link</code>) both work, but PascalCase is the recommended style in Vue 3.`
  },
  // ── 8
  {
    text: `Which history mode does <code>demo14</code> use, and what does it depend on?`,
    code: `const router = createRouter({\n  history: createWebHistory(import.meta.env.BASE_URL),\n  routes\n})`,
    options: [
      `<code>createMemoryHistory()</code> — runs entirely in memory with no URL bar`,
      `<code>createWebHashHistory()</code> — adds a <code>#</code> before the path`,
      `<code>createWebHistory()</code> — uses the HTML5 History API and needs server support`,
      `<code>createHashHistory()</code> — a Vue Router 3-only feature`
    ],
    answer: 2,
    explanation: `<code>createWebHistory()</code> leverages the <strong>HTML5 History API</strong> (pushState), giving clean URLs like <code>/about</code>. It requires the server to serve <code>index.html</code> for all routes; otherwise a direct load of <code>/about</code> returns 404.`
  },
  // ── 9
  {
    text: `What does the <strong>dynamic segment</strong> <code>:uid</code> in <code>/user/:uid</code> mean?`,
    options: [
      `The segment is optional and can be omitted`,
      `The segment is a fixed string "uid"`,
      `The segment is a URL parameter whose value is accessible via <code>$route.params.uid</code>`,
      `The segment makes the route redirect to <code>/uid</code>`
    ],
    answer: 2,
    explanation: `A colon prefix defines a <strong>route parameter</strong>. For the path <code>/user/alice</code>, <code>$route.params.uid</code> equals <code>"alice"</code>. The demo's <code>UserView</code> displays it with <code>{{ $route.params.uid }}</code>.`
  },
  // ── 10
  {
    text: `Look at <code>UserView.vue</code> in <code>demo14</code>. How does it display the user ID?`,
    code: `<template>\n  <h1>{{ $route.params.uid }}</h1>\n  <h3>Selected Message</h3>\n</template>`,
    options: [
      `It reads it from a Pinia store`,
      `It uses <code>props</code> passed from a parent component`,
      `It reads <code>$route.params.uid</code> directly in the template`,
      `It calls a REST API with <code>fetch()</code>`
    ],
    answer: 2,
    explanation: `Inside a component template, <code>$route</code> is automatically available. <code>$route.params.uid</code> gives the value of the <code>:uid</code> dynamic segment from the current URL.`
  },
  // ── 11
  {
    text: `The route <code>{ path: '/:pathMatch(.*)*', component: NotFoundView }</code> is used for:`,
    options: [
      `A route that requires authentication`,
      `Matching all unrecognised paths as a catch-all / 404 page`,
      `Redirecting every route to the home page`,
      `A named route called <code>pathMatch</code>`
    ],
    answer: 1,
    explanation: `The <code>/:pathMatch(.*)*</code> syntax is vue-router's <strong>catch-all</strong> pattern. Any URL that doesn't match a specific route falls here, letting you render a custom 404 view.`
  },
  // ── 12
  {
    text: `In the <strong>Composition API</strong>, which two composables does Vue Router provide to access routing information?`,
    options: [
      `<code>useRoute()</code> and <code>useRouter()</code>`,
      `<code>getRoute()</code> and <code>getRouter()</code>`,
      `<code>$route</code> and <code>$router</code>`,
      `<code>routeRef()</code> and <code>routerRef()</code>`
    ],
    answer: 0,
    explanation: `In <code>&lt;script setup&gt;</code>, you import and call <code>useRoute()</code> to get the reactive current route object and <code>useRouter()</code> to get the router instance for programmatic navigation.`
  },
  // ── 13
  {
    text: `What is the difference between <code>$router</code> and <code>$route</code>?`,
    options: [
      `They are the same object — both refer to the current route`,
      `<code>$router</code> is the router instance (for navigation), <code>$route</code> is the current route object (for reading path/params)`,
      `<code>$route</code> is for navigation and <code>$router</code> is for reading params`,
      `<code>$router</code> only exists in the Options API; <code>$route</code> only in the Composition API`
    ],
    answer: 1,
    explanation: `<code>$router</code> = the router <strong>instance</strong> — you use it to navigate (<code>$router.push('/about')</code>). <code>$route</code> = the <strong>current route</strong> — you use it to read <code>params</code>, <code>query</code>, <code>path</code>, etc.`
  },
  // ── 14
  {
    text: `How do you navigate programmatically to <code>/about</code> using the Options API?`,
    options: [
      `<code>this.$route.go('/about')</code>`,
      `<code>this.$router.push('/about')</code>`,
      `<code>router.navigate('/about')</code>`,
      `<code>this.route('/about')</code>`
    ],
    answer: 1,
    explanation: `<code>this.$router.push('/about')</code> adds a new entry to the history stack and navigates to that route — equivalent to clicking a <code>&lt;RouterLink&gt;</code>.`
  },
  // ── 15
  {
    text: `Which of these is the correct way to define the <code>routes</code> array?`,
    options: [
      `<code>const routes = { '/': HomeView, '/about': AboutView }</code>`,
      `<code>const routes = [ { path: '/', component: HomeView }, { path: '/about', component: AboutView } ]</code>`,
      `<code>const routes = [ 'HomeView', 'AboutView' ]</code>`,
      `<code>const routes = createRoutes(HomeView, AboutView)</code>`
    ],
    answer: 1,
    explanation: `Routes are an <strong>array of objects</strong>. Each object has at minimum a <code>path</code> (URL string) and a <code>component</code> (the Vue component to render). Extra properties like <code>name</code>, <code>meta</code>, and <code>children</code> are optional.`
  },
  // ── 16
  {
    text: `What does registering the router plugin (<code>app.use(router)</code>) do? (Select the best answer)`,
    options: [
      `It only registers <code>&lt;RouterView&gt;</code> globally`,
      `It globally registers <code>&lt;RouterView&gt;</code> and <code>&lt;RouterLink&gt;</code>, adds <code>$router</code>/<code>$route</code>, enables composables, and resolves the initial route`,
      `It fetches route data from the server`,
      `It injects a Pinia store for routing state`
    ],
    answer: 1,
    explanation: `Registering the router plugin does four things: 1) globally registers <code>&lt;RouterView&gt;</code> and <code>&lt;RouterLink&gt;</code>, 2) adds <code>$router</code> and <code>$route</code>, 3) enables <code>useRouter()</code> / <code>useRoute()</code>, and 4) triggers initial route resolution.`
  },
  // ── 17
  {
    text: `Where should <code>&lt;RouterView /&gt;</code> be placed in a Vue project?`,
    options: [
      `Only inside child components, never in <code>App.vue</code>`,
      `Anywhere in the component tree, but it must appear somewhere for routing to render content`,
      `It must be placed exactly in <code>main.js</code>`,
      `It must be the root element of every view component`
    ],
    answer: 1,
    explanation: `<code>&lt;RouterView /&gt;</code> can be placed anywhere in the component tree. Most apps put it in <code>App.vue</code>, but nested layouts can place it inside child components for nested routing.`
  },
  // ── 18
  {
    text: `The route <code>/user/:uid/message/:mid</code> in <code>demo14</code> has how many <strong>dynamic segments</strong>?`,
    options: [
      `1 — only <code>:uid</code>`,
      `0 — both are query parameters`,
      `2 — <code>:uid</code> and <code>:mid</code>`,
      `3 — <code>user</code>, <code>uid</code>, and <code>message</code>`
    ],
    answer: 2,
    explanation: `There are <strong>two</strong> dynamic segments: <code>:uid</code> and <code>:mid</code>. For the URL <code>/user/alice/message/42</code>, <code>$route.params.uid === 'alice'</code> and <code>$route.params.mid === '42'</code>.`
  },
  // ── 19
  {
    text: `Which history mode uses a <code>#</code> symbol in the URL (e.g., <code>example.com/#/about</code>)?`,
    options: [
      `<code>createWebHistory()</code>`,
      `<code>createMemoryHistory()</code>`,
      `<code>createWebHashHistory()</code>`,
      `<code>createHashlessHistory()</code>`
    ],
    answer: 2,
    explanation: `<code>createWebHashHistory()</code> prefixes paths with <code>#</code>, which is never sent to the server — making it safe to deploy on static hosts with no server-side configuration needed.`
  },
  // ── 20
  {
    text: `Given the template below, what does <code>{{ $route.fullPath }}</code> display for the URL <code>/user/alice?tab=messages</code>?`,
    code: `<p>You are at: {{ $route.fullPath }}</p>`,
    options: [
      `<code>/user/alice</code> (path only)`,
      `<code>/user/alice?tab=messages</code> (path + query string)`,
      `<code>alice</code> (just the param value)`,
      `<code>tab=messages</code> (just the query string)`
    ],
    answer: 1,
    explanation: `<code>$route.fullPath</code> returns the <strong>complete URL string</strong> including path, query parameters, and hash. Use <code>$route.path</code> if you only want the path without the query.`
  }
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
const state = {
  current: 0,
  selected: new Array(questions.length).fill(null),
  submitted: new Array(questions.length).fill(false)
};

const LETTERS = ['A', 'B', 'C', 'D'];

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function render() {
  const i = state.current;
  const q = questions[i];
  const card = document.getElementById('q-card');

  // progress + score strip
  const answered = state.submitted.filter(Boolean).length;
  const correct  = state.submitted.reduce((s, done, idx) =>
    s + (done && state.selected[idx] === questions[idx].answer ? 1 : 0), 0);
  const wrong = answered - correct;

  document.getElementById('q-counter').textContent = `Question ${i+1} of ${questions.length}`;
  document.getElementById('q-pct').textContent = `${Math.round((i/questions.length)*100)}%`;
  document.getElementById('progress-fill').style.width = `${((i)/questions.length)*100}%`;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-left').textContent = questions.length - answered;

  // build card HTML
  let html = `<div class="q-meta">Question ${i+1} / ${questions.length}</div>`;
  html += `<div class="q-text">${q.text}</div>`;

  if (q.code) {
    html += `<pre>${syntaxHL(q.code)}</pre>`;
  }

  html += `<div class="options">`;
  q.options.forEach((opt, oi) => {
    let cls = 'option';
    if (state.submitted[i]) {
      cls += ' locked';
      if (oi === q.answer)                   cls += ' correct reveal';
      if (oi === state.selected[i] && oi !== q.answer) cls += ' wrong';
    } else {
      if (oi === state.selected[i]) cls += ' selected';
    }
    html += `<div class="${cls}" onclick="selectOption(${oi})">
               <span class="letter">${LETTERS[oi]}</span>
               <span>${opt}</span>
             </div>`;
  });

  html += `</div>`;

  if (q.explanation) {
    html += `<div class="explanation ${state.submitted[i] ? 'show' : ''}">
              💡 ${q.explanation}
             </div>`;
  }

  // Check / submit button
  if (!state.submitted[i]) {
    html += `<div class="btn-row" style="margin-top:20px">
              <button class="btn btn-primary" onclick="submitAnswer()" id="btn-check"
                ${state.selected[i] === null ? 'disabled' : ''}>
                Check Answer
              </button>
             </div>`;
  } else {
    const wasCorrect = state.selected[i] === q.answer;
    html += `<div style="margin-top:20px;font-weight:700;font-size:1rem;color:${wasCorrect ? 'var(--correct)' : 'var(--wrong)'}">
              ${wasCorrect ? '✅ Correct!' : '❌ Incorrect'}
             </div>`;
  }

  card.innerHTML = html;

  document.getElementById('btn-prev').disabled = (i === 0);
  const isLast = (i === questions.length - 1);
  const nxtBtn = document.getElementById('btn-next');
  if (isLast) {
    nxtBtn.textContent = 'See Results →';
  } else {
    nxtBtn.textContent = 'Next →';
  }
}

function syntaxHL(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*)/g, '<span class="cm">$1</span>')
    .replace(/\b(import|from|const|export|default|return|new)\b/g, '<span class="kw">$1</span>')
    .replace(/\b(createRouter|createWebHistory|createWebHashHistory|createMemoryHistory|createApp)\b/g, '<span class="fn">$1</span>')
    .replace(/'([^']+)'/g, '<span class="str">\'$1\'</span>');
}

function selectOption(idx) {
  const i = state.current;
  if (state.submitted[i]) return;
  state.selected[i] = idx;
  render();
}

function submitAnswer() {
  const i = state.current;
  if (state.selected[i] === null) return;
  state.submitted[i] = true;
  render();
}

function navigate(dir) {
  state.current = Math.max(0, Math.min(questions.length - 1, state.current + dir));
  render();
}

function navigateNext() {
  if (state.current === questions.length - 1) {
    showResults();
  } else {
    navigate(1);
  }
}

/* ═══════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════ */
function showResults() {
  document.getElementById('q-card').style.display = 'none';
  document.querySelector('.btn-row').style.display = 'none';
  document.querySelector('.score-strip').style.display = 'none';

  const correct  = state.submitted.reduce((s, done, idx) =>
    s + (done && state.selected[idx] === questions[idx].answer ? 1 : 0), 0);
  const answered = state.submitted.filter(Boolean).length;
  const pct = Math.round((correct / questions.length) * 100);

  let trophy = '🥉'; let msg = 'Keep practicing!';
  if (pct >= 90) { trophy = '🏆'; msg = 'Outstanding! You nailed it!'; }
  else if (pct >= 75) { trophy = '🥇'; msg = 'Great work!'; }
  else if (pct >= 55) { trophy = '🥈'; msg = 'Good effort!'; }

  let reviewHTML = '';
  questions.forEach((q, idx) => {
    if (!state.submitted[idx]) return;
    const pass = state.selected[idx] === q.answer;
    if (!pass) {
      reviewHTML += `<div class="review-item">
        <div class="ri-q">Q${idx+1}: ${q.text.replace(/<[^>]*>/g,'')}</div>
        <div class="ri-a">✓ Correct: ${q.options[q.answer].replace(/<[^>]*>/g,'')}</div>
        <div class="ri-x">✗ Your answer: ${state.selected[idx] !== null ? q.options[state.selected[idx]].replace(/<[^>]*>/g,'') : 'Not answered'}</div>
      </div>`;
    }
  });

  const results = document.getElementById('results');
  results.style.display = 'block';
  results.innerHTML = `
    <div class="trophy">${trophy}</div>
    <h2>${msg}</h2>
    <div class="final-score" style="color:${pct>=75?'var(--correct)':'var(--wrong)'}">${pct}%</div>
    <div class="grade-bar">
      <div class="grade-block"><div class="grade-num" style="color:var(--correct)">${correct}</div><div class="grade-label">Correct</div></div>
      <div class="grade-block"><div class="grade-num" style="color:var(--wrong)">${answered - correct}</div><div class="grade-label">Wrong</div></div>
      <div class="grade-block"><div class="grade-num" style="color:var(--muted)">${questions.length - answered}</div><div class="grade-label">Skipped</div></div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto 32px;display:block">🔄 Restart Quiz</button>
    ${reviewHTML ? `<div class="review-list"><h3>❌ Questions to review:</h3>${reviewHTML}</div>` : '<p style="color:var(--correct);font-weight:700;font-size:1.1rem;">🎉 You got everything right!</p>'}
  `;
}

function restartQuiz() {
  state.current = 0;
  state.selected.fill(null);
  state.submitted.fill(false);
  document.getElementById('q-card').style.display = 'block';
  document.querySelector('.btn-row').style.display = 'flex';
  document.querySelector('.score-strip').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  render();
}

// Init
render();
</script>
</body>
</html>
